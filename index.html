<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Campeonato de España Futbolchapas 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #b30000;
            color: white;
            padding: 20px;
            text-align: center;
        }

        section {
            padding: 15px;
            margin: 10px;
            background: white;
            border-radius: 8px;
        }

        h2 {
            border-bottom: 2px solid #b30000;
            padding-bottom: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #eee;
        }

        .grupo {
            font-weight: bold;
            color: #b30000;
        }
    </style>
</head>
<body>

<header>
    <h1>Campeonato de España Futbolchapas 2026</h1>
    <p>Mérida</p>
</header>

<section>
    <h2>Mi Grupo</h2>
    <p class="grupo">Grupo A</p>
    <ul>
        <li>Jugador 1</li>
        <li>Jugador 2</li>
        <li>Jugador 3</li>
        <li>Jugador 4</li>
    </ul>
</section>

<section>
    <h2>Partidos</h2>
    <table>
        <tr>
            <th>Hora</th>
            <th>Partido</th>
            <th>Resultado</th>
        </tr>
        <tr>
            <td>10:00</td>
            <td>Jugador 1 vs Jugador 2</td>
            <td>-</td>
        </tr>
        <tr>
            <td>11:00</td>
            <td>Jugador 3 vs Jugador 4</td>
            <td>-</td>
        </tr>
    </table>
</section>

<section>
    <h2>Clasificación</h2>
    <table>
        <tr>
            <th>Jugador</th>
            <th>Puntos</th>
        </tr>
        <tr>
            <td>Jugador 1</td>
            <td>0</td>
        </tr>
        <tr>
            <td>Jugador 2</td>
            <td>0</td>
        </tr>
    </table>
</section>

</body>
</html>
