<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Campeonato de España Futbolchapas 2026</title>

    <link rel="stylesheet" href="css/styles.css">

</head>


<body>

    <!-- ========================= -->
    <!-- MENÚ SUPERIOR -->
    <!-- ========================= -->

    <header class="navbar">

        <div class="logo">
            <img src="images/logo.png" alt="Logo campeonato">
        </div>

        <div class="menu-icon" onclick="toggleMenu()">
            ☰
        </div>

        <nav id="menu">

            <a href="index.html">
                Inicio
            </a>

            <a href="#">
                Más
            </a>

        </nav>

    </header>



    <!-- ========================= -->
    <!-- CONTENIDO PRINCIPAL -->
    <!-- ========================= -->

    <main>

        <div class="button-grid">

            <!-- INDIVIDUAL -->

            <button
                class="main-button"
                onclick="toggleSubmenu('individual-menu')"
            >

                <img
                    src="images/individual.jpg"
                    alt="Campeonato individual"
                >

                <span>
                    Campeonato Individual
                </span>

            </button>


            <div id="individual-menu" class="submenu">

                <a href="grupos_individual.html">
                    Fase de grupos
                </a>

                <a href="final_individual.html">
                    Fase final
                </a>

            </div>



            <!-- PAREJAS -->

            <button
                class="main-button"
                onclick="toggleSubmenu('parejas-menu')"
            >

                <img
                    src="images/parejas.jpg"
                    alt="Campeonato parejas"
                >

                <span>
                    Campeonato por Parejas
                </span>

            </button>


            <div id="parejas-menu" class="submenu">

                <a href="grupos_parejas.html">
                    Fase de grupos
                </a>

                <a href="final_parejas.html">
                    Fase final
                </a>

            </div>



            <!-- INFANTIL -->

            <button
                class="main-button"
                onclick="toggleSubmenu('infantil-menu')"
            >

                <img
                    src="images/infantil.jpg"
                    alt="Campeonato infantil"
                >

                <span>
                    Campeonato Infantil
                </span>

            </button>


            <div id="infantil-menu" class="submenu">

                <a href="grupos_infantil.html">
                    Fase de grupos
                </a>

                <a href="final_infantil.html">
                    Fase final
                </a>

            </div>



            <!-- EQUIPOS -->

            <button
                class="main-button"
                onclick="location.href='equipos.html'"
            >

                <img
                    src="images/equipos.jpg"
                    alt="Campeonato equipos"
                >

                <span>
                    Campeonato por Equipos
                </span>

            </button>

            <div id="infantil-menu" class="submenu">

                <a href="grupos_equipos_infantil.html">
                    Fase de grupos
                </a>

                <a href="final_equipos_infantil.html">
                    Fase final
                </a>

            </div>

        </div>



        <!-- BOTONES SECUNDARIOS -->

        <div class="secondary">

            <a
                href="https://maps.google.com"
                target="_blank"
            >
                📍 Lugar de competición
            </a>

            <a href="#">
                ℹ Información del evento
            </a>

        </div>

    </main>


    <script src="js/script.js"></script>

</body>

</html>
